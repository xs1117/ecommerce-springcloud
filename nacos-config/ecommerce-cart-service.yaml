spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_cart?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 736100
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true
  data:
    redis:
      cluster:
        nodes:
          - localhost:7000
          - localhost:7001
          - localhost:7002
          - localhost:7003
          - localhost:7004
          - localhost:7005
      timeout: 3s
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 30s

security:
  token-secret: "ecommerce-local-dev-secret-change-me"

app:
  cart:
    store:
      read: redis
      write: redis
  integration:
    merchant:
      service-id: ecommerce-merchant-service
      base-url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

