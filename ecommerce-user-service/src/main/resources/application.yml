server:
  port: 8083

spring:
  config:
    import:
      - 'optional:nacos:ecommerce-common.yaml?group=ECOMMERCE_DEV'
      - 'optional:nacos:ecommerce-user-service.yaml?group=ECOMMERCE_DEV'
  application:
    name: ecommerce-user-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_user?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 736100
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true
  jackson:
    time-zone: Asia/Shanghai

security:
  token-secret: "ecommerce-local-dev-secret-change-me"
  token-expire-minutes: 10080

app:
  upload:
    user-root: ./data/uploads/user

management:
  endpoints:
    web:
      exposure:
        include: health,info

